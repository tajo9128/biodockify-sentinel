services:
  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biodockify-sentinel
    restart: unless-stopped
    network_mode: host
    environment:
      - CHECK_INTERVAL=1800
      - COOLDOWN_SECONDS=300
      - OPENCLAW_URL=http://127.0.0.1:18789
      - MONITORED_SERVICES=biodockify-api,biodockify-docking-worker,biodockify-ranking-worker,biodockify-md-worker,caddy-reverse
      - AUTO_HEAL=true
      - DATABASE_URL=postgresql://biodockify_user:biodockify_secure_pass@172.30.1.7:5432/biodockify
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sentinel_data:/app/audit
    command: python -m sentinel.core

volumes:
  sentinel_data:
    driver: local